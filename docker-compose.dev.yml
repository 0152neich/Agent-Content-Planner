networks:
  app-tier:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:17.0-alpine
    restart: always
    ports:
      - 5432:5432
    networks:
      - app-tier
    environment:
      POSTGRES_USER: ${POSTGRES__USER}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES_DB: ${POSTGRES__DB}
      POSTGRES_HOST: ${POSTGRES__HOST}
      POSTGRES_PORT: ${POSTGRES__PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
