server {
  listen 80;
  server_name acp.id.vn www.acp.id.vn;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://acp.id.vn$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name www.acp.id.vn;
  http2 on;

  ssl_certificate /etc/letsencrypt/live/acp.id.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/acp.id.vn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  return 301 https://acp.id.vn$request_uri;
}

server {
  listen 443 ssl;
  server_name acp.id.vn;
  http2 on;

  client_max_body_size 20m;
  resolver 127.0.0.11 valid=30s ipv6=off;

  ssl_certificate /etc/letsencrypt/live/acp.id.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/acp.id.vn/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $frontend_upstream frontend:80;
    proxy_pass http://$frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    set $backend_upstream backend:8000;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
