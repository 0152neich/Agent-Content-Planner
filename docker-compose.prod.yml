networks:
  app-tier:
    driver: bridge

volumes:
  postgres_data:
  letsencrypt:
  certbot_www:

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/${NGINX_PROXY_CONF:-prod.reverse-proxy.bootstrap.conf}:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app-tier

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tools
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - app-tier

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    networks:
      - app-tier

  postgres:
    image: postgres:17.0-alpine
    restart: always
    ports:
      - 15432:5432
    networks:
      - app-tier
    environment:
      POSTGRES_USER: ${POSTGRES__USER}
      POSTGRES_PASSWORD: ${POSTGRES__PASSWORD}
      POSTGRES_DB: ${POSTGRES__DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES__USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app/src
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements.txt
      && uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      POSTGRES__HOST: ${POSTGRES__HOST}
      POSTGRES__PORT: ${POSTGRES__PORT}
      CELERY__BROKER_URL: ${CELERY__BROKER_URL}
      CELERY__RESULT_BACKEND: ${CELERY__RESULT_BACKEND}
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt:ro
      - ./uploads:/home/Agent-Content-Planner/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-tier

  worker:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app/src
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements.txt
      && celery -A app.autopost_celery.celery_app worker --loglevel=INFO"
    env_file:
      - .env
    environment:
      POSTGRES__HOST: ${POSTGRES__HOST}
      POSTGRES__PORT: ${POSTGRES__PORT}
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt:ro
      - ./uploads:/home/Agent-Content-Planner/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-tier

  beat:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app/src
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements.txt
      && celery -A app.autopost_celery.celery_app beat --loglevel=INFO"
    env_file:
      - .env
    environment:
      POSTGRES__HOST: ${POSTGRES__HOST}
      POSTGRES__PORT: ${POSTGRES__PORT}
      CELERY__BROKER_URL: ${CELERY__BROKER_URL}
      CELERY__RESULT_BACKEND: ${CELERY__RESULT_BACKEND}
    volumes:
      - ./src:/app/src
      - ./requirements.txt:/app/requirements.txt:ro
      - ./uploads:/home/Agent-Content-Planner/uploads
    depends_on:
      redis:
        condition: service_started
      worker:
        condition: service_started
    networks:
      - app-tier

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-tier
